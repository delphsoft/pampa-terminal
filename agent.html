<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente IA — Pampa Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07070f;--bg2:#0d0d1a;--bgp:#111120;--bgph:#161628;
  --b:#1c1c32;--bB:#282845;
  --or:#ff6b00;--orD:#cc5500;--orL:#ff9944;
  --gr:#00c853;--grD:#00962e;
  --rd:#ff1744;--cy:#00e5ff;--yl:#ffd600;--pu:#aa44ff;
  --t1:#e8e8f8;--t2:#9090b8;--t3:#444466;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:'IBM Plex Mono',monospace;font-size:12px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bB)}

#hdr{background:linear-gradient(90deg,#000,#050510);border-bottom:2px solid var(--or);padding:6px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-bar{width:3px;height:28px;background:var(--or)}
.logo-t{font-size:15px;font-weight:700;color:var(--or);letter-spacing:4px}
.logo-s{font-size:8px;color:var(--t3);letter-spacing:2px;margin-top:1px}
.nav-links{display:flex;gap:0}
.nav-link{padding:6px 14px;font-size:10px;color:var(--t2);text-decoration:none;letter-spacing:1px;border-right:1px solid var(--b);transition:all .15s}
.nav-link:hover,.nav-link.active{color:var(--or);background:var(--bgp)}

/* AGENT CONTROLS */
#agent-ctrl{background:var(--bg2);border-bottom:1px solid var(--b);padding:8px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.ctrl-grp{display:flex;flex-direction:column;gap:3px}
.ctrl-lbl{font-size:8px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase}
.profile-btns{display:flex;gap:4px}
.prof-btn{font-size:10px;padding:5px 14px;border:1px solid var(--bB);background:var(--bgp);color:var(--t2);cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;transition:all .15s}
.prof-btn:hover{border-color:var(--or);color:var(--t1)}
.prof-btn.active{font-weight:700}
.prof-btn.conservador.active{border-color:var(--cy);color:var(--cy);background:#001a20}
.prof-btn.moderado.active{border-color:var(--yl);color:var(--yl);background:#1a1800}
.prof-btn.agresivo.active{border-color:var(--rd);color:var(--rd);background:#200010}
.lang-btn{font-size:10px;padding:5px 12px;border:1px solid var(--bB);background:var(--bgp);color:var(--t2);cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .15s}
.lang-btn:hover,.lang-btn.active{border-color:var(--or);color:var(--or);background:#1a0a00}
.sep{width:1px;height:30px;background:var(--bB)}

/* MAIN LAYOUT */
#main{display:flex;flex:1;min-height:0;overflow:hidden}

/* SIDEBAR */
#sidebar{width:280px;border-right:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0;background:var(--bg2)}
.sb-section{padding:12px 14px;border-bottom:1px solid var(--b)}
.sb-title{font-size:9px;color:var(--or);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.quick-btn{display:block;width:100%;text-align:left;background:var(--bgp);border:1px solid var(--b);color:var(--t2);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:7px 10px;cursor:pointer;margin-bottom:4px;transition:all .15s;line-height:1.4}
.quick-btn:hover{border-color:var(--or);color:var(--t1);background:var(--bgph)}
.context-item{display:flex;justify-content:space-between;font-size:10px;padding:3px 0;border-bottom:1px solid var(--t3)}
.context-item:last-child{border:none}
.ci-lbl{color:var(--t3)}.ci-val{font-weight:600}

/* CHAT */
#chat-wrap{flex:1;display:flex;flex-direction:column;min-width:0}
#messages{flex:1;overflow-y:auto;padding:16px}
.msg{display:flex;gap:10px;margin-bottom:16px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg-avatar{width:32px;height:32px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg-user .msg-avatar{background:var(--orD)}
.msg-ai .msg-avatar{background:#001a20;border:1px solid var(--cy)}
.msg-body{flex:1;min-width:0}
.msg-role{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.msg-user .msg-role{color:var(--or)}
.msg-ai .msg-role{color:var(--cy)}
.msg-text{font-size:11px;line-height:1.8;color:var(--t1);font-family:'IBM Plex Sans',sans-serif;white-space:pre-wrap;word-wrap:break-word}
.msg-text b,.msg-text strong{color:var(--yl);font-weight:600}
.msg-text code{background:var(--bgp);padding:1px 5px;border-radius:2px;font-family:'IBM Plex Mono',monospace;color:var(--cy)}

/* TYPING INDICATOR */
.typing{display:flex;gap:4px;align-items:center;padding:4px 0}
.typing span{width:6px;height:6px;background:var(--cy);border-radius:50%;animation:bounce .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* INPUT */
#input-bar{border-top:1px solid var(--b);padding:10px 14px;display:flex;gap:8px;background:var(--bg2);flex-shrink:0}
#chat-input{flex:1;background:var(--bgp);border:1px solid var(--bB);color:var(--t1);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:10px 14px;outline:none;resize:none;min-height:42px;max-height:120px;-webkit-user-select:text;user-select:text}
#chat-input:focus{border-color:var(--or)}
#send-btn{background:var(--orD);color:#fff;border:1px solid var(--or);font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;padding:10px 18px;cursor:pointer;letter-spacing:1px;transition:background .15s;flex-shrink:0}
#send-btn:hover{background:var(--or)}
#send-btn:disabled{opacity:.4;cursor:not-allowed}
#clear-btn{background:none;border:1px solid var(--bB);color:var(--t2);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:10px 12px;cursor:pointer;transition:all .15s}
#clear-btn:hover{border-color:var(--rd);color:var(--rd)}
</style>
</head>
<body>

<div id="hdr">
  <div class="logo">
    <div class="logo-bar"></div>
    <div><div class="logo-t">PAMPA TERMINAL</div><div class="logo-s">AGENTE IA · ANÁLISIS PERSONALIZADO</div></div>
  </div>
  <div class="nav-links">
    <a href="/terminal.html" class="nav-link">📊 Terminal</a>
    <a href="/on.html" class="nav-link">📋 ON</a>
    <a href="/agent.html" class="nav-link active">🧠 Agente IA</a>
    <a href="/portfolio.html" class="nav-link">💼 Portfolio</a>
  </div>
</div>

<!-- CONTROLS -->
<div id="agent-ctrl">
  <div class="ctrl-grp">
    <div class="ctrl-lbl">Perfil inversor</div>
    <div class="profile-btns">
      <button class="prof-btn conservador" onclick="setProfile('conservador')">🛡 Conservador</button>
      <button class="prof-btn moderado active" onclick="setProfile('moderado')">⚖ Moderado</button>
      <button class="prof-btn agresivo" onclick="setProfile('agresivo')">🚀 Agresivo</button>
    </div>
  </div>
  <div class="sep"></div>
  <div class="ctrl-grp">
    <div class="ctrl-lbl">Idioma</div>
    <div style="display:flex;gap:4px">
      <button class="lang-btn active" id="lang-es" onclick="setLang('es')">🇦🇷 ES</button>
      <button class="lang-btn" id="lang-en" onclick="setLang('en')">🇺🇸 EN</button>
    </div>
  </div>
  <div class="sep"></div>
  <div style="font-size:10px;color:var(--t3)">
    Perfil: <span id="profile-display" style="color:var(--yl);font-weight:700">MODERADO</span> ·
    <span id="context-display" style="color:var(--t2)">Cargando contexto...</span>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-section">
      <div class="sb-title">Consultas rápidas</div>
      <button class="quick-btn" onclick="sendQuick('¿Cuál es la cartera recomendada para mi perfil con $500.000 ARS?')">💼 Cartera recomendada</button>
      <button class="quick-btn" onclick="sendQuick('¿Qué ONs me recomendás para dolarizarme con bajo riesgo?')">📋 ONs para dolarizarme</button>
      <button class="quick-btn" onclick="sendQuick('¿Cómo está el contexto macro argentino hoy y cómo afecta mis inversiones?')">🌐 Contexto macro ARG</button>
      <button class="quick-btn" onclick="sendQuick('¿Qué CEDEARs tienen mejor señal técnica ahora mismo?')">📈 CEDEARs con señal</button>
      <button class="quick-btn" onclick="sendQuick('Explicame cómo funciona el riesgo país y cómo impacta en los bonos')">🏛 Riesgo país</button>
      <button class="quick-btn" onclick="sendQuick('¿Cuál es la diferencia entre GD30 y AL30? ¿Cuál me conviene?')">⚖ GD30 vs AL30</button>
      <button class="quick-btn" onclick="sendQuick('¿Es buen momento para invertir en acciones locales o mejor esperar?')">🤔 ¿Acciones locales ahora?</button>
      <button class="quick-btn" onclick="sendQuick('Armame un portfolio con $100 USD diversificado en renta fija argentina')">🎯 Portfolio $100 USD</button>
    </div>
    <div class="sb-section">
      <div class="sb-title">Contexto de mercado</div>
      <div id="market-context">
        <div class="context-item"><span class="ci-lbl">USD CCL</span><span class="ci-val" id="ctx-ccl">—</span></div>
        <div class="context-item"><span class="ci-lbl">USD Blue</span><span class="ci-val" id="ctx-blue">—</span></div>
        <div class="context-item"><span class="ci-lbl">Merval</span><span class="ci-val" id="ctx-merval">—</span></div>
        <div class="context-item"><span class="ci-lbl">Oro</span><span class="ci-val" id="ctx-gold">—</span></div>
        <div class="context-item"><span class="ci-lbl">Perfil</span><span class="ci-val" id="ctx-profile" style="color:var(--yl)">—</span></div>
      </div>
    </div>
    <div class="sb-section" style="flex:1;overflow-y:auto">
      <div class="sb-title">Tu portfolio</div>
      <div id="portfolio-summary" style="font-size:10px;color:var(--t3)">
        <a href="/portfolio.html" style="color:var(--or);text-decoration:none">Cargando portfolio →</a>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat-wrap">
    <div id="messages">
      <!-- Welcome message injected by JS -->
    </div>
    <div id="input-bar">
      <textarea id="chat-input" placeholder="Preguntá sobre tu cartera, estrategias, instrumentos, contexto macro..." rows="1"></textarea>
      <button id="clear-btn" onclick="clearChat()" title="Limpiar conversación">🗑</button>
      <button id="send-btn" onclick="sendMessage()">ENVIAR →</button>
    </div>
  </div>

</div>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────
let profile = 'moderado';
let lang = 'es';
let messages = [];
let marketCtx = { ccl: 1470, blue: 1390, merval: 2998770, gold: 3128 };
let userPortfolio = null;
let isLoading = false;

const profileColors = { conservador: 'var(--cy)', moderado: 'var(--yl)', agresivo: 'var(--rd)' };
const profileLabels = { conservador: 'CONSERVADOR', moderado: 'MODERADO', agresivo: 'AGRESIVO' };

// ── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  // Load market context
  await loadContext();

  // Load portfolio if exists
  try {
    const u = JSON.parse(localStorage.getItem('pampa_user') || 'null');
    if (u?.email) {
      const r = await fetch(`/api/portfolio?email=${encodeURIComponent(u.email)}`);
      if (r.ok) {
        const d = await r.json();
        userPortfolio = d.portfolio;
        renderPortfolioSummary();
      }
    }
  } catch {}

  // Welcome message
  addAIMessage(lang === 'es'
    ? `¡Hola! Soy **Pampa AI**, tu asesor de mercado argentino.\n\nEstoy configurado con tu perfil **${profileLabels[profile]}**. Puedo ayudarte con:\n\n• Análisis de instrumentos (acciones, CEDEARs, ONs, bonos)\n• Construcción y optimización de carteras\n• Interpretación del contexto macro argentino\n• Comparación de alternativas de inversión\n• Estrategias según tu perfil de riesgo\n\n¿Por dónde empezamos?`
    : `Hi! I'm **Pampa AI**, your Argentine market advisor.\n\nI'm configured with your **${profileLabels[profile]}** profile. How can I help you today?`
  );
}

async function loadContext() {
  try {
    const [dr, mr] = await Promise.allSettled([
      fetch('/api/dolar'),
      fetch('/api/market'),
    ]);
    if (dr.status === 'fulfilled' && dr.value.ok) {
      const d = await dr.value.json();
      if (d.ccl)  { marketCtx.ccl  = d.ccl.venta;  document.getElementById('ctx-ccl').textContent  = '$' + d.ccl.venta.toLocaleString('es-AR'); }
      if (d.blue) { marketCtx.blue = d.blue.venta; document.getElementById('ctx-blue').textContent = '$' + d.blue.venta.toLocaleString('es-AR'); }
    }
    if (mr.status === 'fulfilled' && mr.value.ok) {
      const m = await mr.value.json();
      if (m.market?.merval) { marketCtx.merval = m.market.merval.value; document.getElementById('ctx-merval').textContent = m.market.merval.value.toLocaleString('es-AR', {maximumFractionDigits:0}); }
      if (m.market?.gold)   { marketCtx.gold   = m.market.gold.value;   document.getElementById('ctx-gold').textContent   = '$' + m.market.gold.value.toFixed(0); }
    }
    document.getElementById('ctx-profile').textContent = profileLabels[profile];
    document.getElementById('context-display').textContent = `CCL $${marketCtx.ccl.toLocaleString('es-AR',{maximumFractionDigits:0})} · Merval ${(marketCtx.merval/1000).toFixed(0)}K`;
  } catch {}
}

function renderPortfolioSummary() {
  const el = document.getElementById('portfolio-summary');
  if (!userPortfolio?.positions?.length) {
    el.innerHTML = `<div style="color:var(--t3);font-size:10px">Sin posiciones guardadas.<br><a href="/portfolio.html" style="color:var(--or)">Ir al portfolio →</a></div>`;
    return;
  }
  const count = userPortfolio.positions.length;
  const types = [...new Set(userPortfolio.positions.map(p => p.type))];
  el.innerHTML = `
    <div style="color:var(--t2);margin-bottom:6px">${count} posición${count !== 1 ? 'es' : ''} · ${types.join(', ')}</div>
    ${userPortfolio.positions.slice(0, 5).map(p => `<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--t3)"><span style="color:var(--yl)">${p.ticker}</span><span style="color:var(--t2)">${p.qty} × $${p.buyPrice.toFixed(0)}</span></div>`).join('')}
    ${count > 5 ? `<div style="color:var(--t3);margin-top:4px">+${count-5} más → <a href="/portfolio.html" style="color:var(--or)">ver todo</a></div>` : ''}`;
}

// ── PROFILE & LANG ────────────────────────────────────────────────────────
function setProfile(p) {
  profile = p;
  document.querySelectorAll('.prof-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.prof-btn.${p}`).classList.add('active');
  document.getElementById('profile-display').textContent = profileLabels[p];
  document.getElementById('profile-display').style.color = profileColors[p];
  document.getElementById('ctx-profile').textContent = profileLabels[p];
  messages = []; // Reset conversation for new profile
  document.getElementById('messages').innerHTML = '';
  addAIMessage(lang === 'es'
    ? `Perfil cambiado a **${profileLabels[p]}**. ${
        p === 'conservador' ? 'Priorizaré preservación de capital en USD, ONs hard dollar y renta fija de calidad.' :
        p === 'moderado'    ? 'Buscaré un balance entre crecimiento y seguridad: mix de acciones, CEDEARs y renta fija.' :
        'Apuntaremos a máximo crecimiento: acciones growth, galpones y CEDEARs tech con mayor volatilidad.'
      }\n\n¿Cómo puedo ayudarte?`
    : `Profile changed to **${profileLabels[p]}**.`
  );
}

function setLang(l) {
  lang = l;
  document.getElementById('lang-es').classList.toggle('active', l === 'es');
  document.getElementById('lang-en').classList.toggle('active', l === 'en');
}

// ── MESSAGES ──────────────────────────────────────────────────────────────
function addUserMessage(text) {
  const el = document.createElement('div');
  el.className = 'msg msg-user';
  el.innerHTML = `<div class="msg-avatar">👤</div><div class="msg-body"><div class="msg-role">Vos</div><div class="msg-text">${escapeHtml(text)}</div></div>`;
  document.getElementById('messages').appendChild(el);
  scrollToBottom();
}

function addAIMessage(text) {
  const el = document.createElement('div');
  el.className = 'msg msg-ai';
  el.innerHTML = `<div class="msg-avatar">🧠</div><div class="msg-body"><div class="msg-role">Pampa AI</div><div class="msg-text">${formatText(text)}</div></div>`;
  document.getElementById('messages').appendChild(el);
  scrollToBottom();
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'msg msg-ai'; el.id = 'typing-indicator';
  el.innerHTML = `<div class="msg-avatar">🧠</div><div class="msg-body"><div class="msg-role">Pampa AI</div><div class="typing"><span></span><span></span><span></span></div></div>`;
  document.getElementById('messages').appendChild(el);
  scrollToBottom();
}

function removeTyping() {
  document.getElementById('typing-indicator')?.remove();
}

function formatText(text) {
  return escapeHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scrollToBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

// ── SEND ──────────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  addUserMessage(text);
  messages.push({ role: 'user', content: text });

  showTyping();

  try {
    const response = await fetch('/api/agent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages,
        profile,
        lang,
        portfolio: userPortfolio?.positions?.length ? userPortfolio.positions.slice(0, 10) : null,
        context: marketCtx,
      }),
    });

    removeTyping();

    if (response.ok) {
      const data = await response.json();
      const reply = data.reply || 'No pude generar una respuesta. Intentá de nuevo.';
      addAIMessage(reply);
      messages.push({ role: 'assistant', content: reply });
      // Keep last 20 messages
      if (messages.length > 20) messages = messages.slice(-20);
    } else {
      throw new Error('API error');
    }
  } catch (e) {
    removeTyping();
    addAIMessage(lang === 'es'
      ? '⚠ No pude conectarme al servicio de IA. Verificá que la API key de Anthropic esté configurada en Vercel. Mientras tanto, podés consultar el terminal para análisis técnico y fundamentals.'
      : '⚠ Could not connect to the AI service. Please check the Anthropic API key in Vercel settings.'
    );
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function sendQuick(text) {
  document.getElementById('chat-input').value = text;
  sendMessage();
}

function clearChat() {
  if (!confirm('¿Limpiar la conversación?')) return;
  messages = [];
  document.getElementById('messages').innerHTML = '';
  addAIMessage(lang === 'es' ? 'Conversación reiniciada. ¿En qué puedo ayudarte?' : 'Conversation cleared. How can I help you?');
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

init();
</script>
</body>
</html>
